<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withings Health Sync - Authorization</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 22px; color: #333; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
    .code-container {
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin: 20px 0;
      word-break: break-all;
      font-family: 'SF Mono', Monaco, Menlo, monospace;
      font-size: 14px;
      color: #333;
      user-select: all;
      cursor: pointer;
    }
    .code-container:hover { background: #e8e8e8; }
    .instructions {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      text-align: left;
      margin-top: 16px;
    }
    .instructions li { margin-bottom: 8px; }
    .error { color: #c00; font-weight: 600; }
    .success { color: #2a7e3b; font-weight: 600; }
    .copy-btn {
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 24px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 12px;
    }
    .copy-btn:hover { background: #555; }
    .copy-btn.copied { background: #2a7e3b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Withings Health Sync</h1>
    <p class="subtitle">OAuth2 Authorization Callback</p>
    <div id="content"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    const content = document.getElementById('content');

    if (error) {
      content.innerHTML = `<p class="error">Authorization failed: ${error}</p>`;
    } else if (code) {
      content.innerHTML = `
        <p class="success">Authorization successful!</p>
        <p class="subtitle">Your authorization code:</p>
        <div class="code-container" id="codeBox" title="Click to select">${code}</div>
        <button class="copy-btn" id="copyBtn">Copy to clipboard</button>
        <ol class="instructions">
          <li>Copy the code above</li>
          <li>Switch to your terminal</li>
          <li>Paste the code at the prompt</li>
        </ol>
      `;

      document.getElementById('copyBtn').addEventListener('click', function() {
        navigator.clipboard.writeText(code).then(() => {
          this.textContent = 'Copied!';
          this.classList.add('copied');
          setTimeout(() => {
            this.textContent = 'Copy to clipboard';
            this.classList.remove('copied');
          }, 2000);
        });
      });
    } else {
      content.innerHTML = `
        <p class="error">No authorization code found.</p>
        <p class="subtitle">This page should be reached via the Withings OAuth redirect.</p>
        <ol class="instructions">
          <li>Run <code>npm run authorize</code> in your terminal</li>
          <li>Open the displayed URL in your browser</li>
          <li>Authorize with your Withings account</li>
          <li>You'll be redirected back here with a code</li>
        </ol>
      `;
    }
  </script>
</body>
</html>
